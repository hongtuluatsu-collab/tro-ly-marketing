<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập — Minh Tú Marketing Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#080f1e;--navy2:#0e1830;--navy3:#14213d;--gold:#c9a252;--gold2:#e8c47a;--cream:#e8dfc8;--cream2:#f4f0e6;--muted:#8892a4;--border:#1e2d4a;--border2:#263552;}
body{background:var(--navy);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}

/* grid bg */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:0.2;pointer-events:none;}

/* gold glow top */
body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(201,162,82,0.08) 0%,transparent 70%);pointer-events:none;}

.login-wrap{position:relative;z-index:10;width:100%;max-width:420px;padding:1rem;}

/* logo */
.brand{text-align:center;margin-bottom:2.5rem;}
.brand-mark{
  width:52px;height:52px;border:1.5px solid var(--gold);
  display:inline-flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--gold);
  position:relative;margin-bottom:1rem;
}
.brand-mark::after{content:'';position:absolute;inset:4px;border:0.5px solid rgba(201,162,82,0.25);}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:14px;letter-spacing:4px;color:var(--cream2);text-transform:uppercase;display:block;}
.brand-sub{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:4px;display:block;}

/* card */
.card{background:var(--navy2);border:1px solid var(--border);padding:2.5rem;position:relative;}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--gold),transparent);}

.card-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--cream2);margin-bottom:4px;}
.card-sub{font-size:12px;color:var(--muted);margin-bottom:2rem;letter-spacing:0.5px;}

label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:400;}
.input-wrap{position:relative;margin-bottom:1.25rem;}
input{
  width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--border2);
  color:var(--cream);padding:12px 14px;font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:300;outline:none;transition:border-color 0.2s,background 0.2s;
  border-radius:0;-webkit-appearance:none;
}
input:focus{border-color:var(--gold);background:rgba(201,162,82,0.04);}
input::placeholder{color:var(--border2);}

/* toggle password */
.toggle-pw{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:12px;letter-spacing:1px;padding:4px;
  font-family:'DM Sans',sans-serif;
}
.toggle-pw:hover{color:var(--gold);}

/* error */
.error{
  background:rgba(180,50,50,0.1);border:1px solid rgba(180,50,50,0.3);
  border-left:2px solid #c05050;
  padding:10px 14px;margin-bottom:1.25rem;
  font-size:13px;color:#e07070;display:flex;align-items:center;gap:8px;
}

/* submit */
.btn-login{
  width:100%;padding:13px;background:var(--gold);color:var(--navy);
  font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:2.5px;
  text-transform:uppercase;cursor:pointer;border:none;font-weight:500;
  transition:background 0.2s;margin-top:0.5rem;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.btn-login:hover{background:var(--gold2);}
.btn-login:disabled{opacity:0.5;cursor:not-allowed;}

/* footer note */
.login-footer{text-align:center;margin-top:1.5rem;font-size:11px;color:var(--border2);letter-spacing:1px;}

/* animate in */
.login-wrap{animation:fadeUp 0.5s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="login-wrap">

  <div class="brand">
    <div class="brand-mark">MT</div>
    <span class="brand-name">Minh Tú Law</span>
    <span class="brand-sub">Marketing Intelligence Platform</span>
  </div>

  <div class="card">
    <div class="card-title">Đăng nhập</div>
    <div class="card-sub">Dành riêng cho đội ngũ marketing Công ty Luật Minh Tú</div>

    {% if error %}
    <div class="error">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login" id="login-form">
      <div class="form-group">
        <label>Tên đăng nhập</label>
        <input type="text" name="username" placeholder="Nhập tên đăng nhập" autocomplete="username" autofocus required>
      </div>

      <div class="form-group">
        <label>Mật khẩu</label>
        <div class="input-wrap">
          <input type="password" name="password" id="pw-input" placeholder="Nhập mật khẩu" autocomplete="current-password" required>
          <button type="button" class="toggle-pw" onclick="togglePw()">Hiện</button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btn-submit">
        <span>Đăng nhập</span>
        <span>→</span>
      </button>
    </form>
  </div>

  <div class="login-footer">© 2025 Công ty Luật Minh Tú — Nội bộ</div>
</div>

<script>
function togglePw(){
  const inp = document.getElementById('pw-input');
  const btn = inp.nextElementSibling;
  if(inp.type === 'password'){inp.type='text';btn.textContent='Ẩn';}
  else{inp.type='password';btn.textContent='Hiện';}
}
document.getElementById('login-form').addEventListener('submit',function(){
  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.innerHTML = '<span>Đang xác thực...</span>';
});
</script>
</body>
</html>
